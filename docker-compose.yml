services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: "Yandex Reviews Parser"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      APP_KEY: ""
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: reviews
      DB_USERNAME: reviews
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      SANCTUM_STATEFUL_DOMAINS: "localhost,localhost:8000,127.0.0.1,127.0.0.1:8000"
      YANDEX_REVIEWS_PAGE_SIZE: "50"
      YANDEX_MAX_REVIEWS: "600"
      YANDEX_HTTP_TIMEOUT: "20"
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: reviews
      MYSQL_USER: reviews
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "reviews", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
